# 补建说明：该 workflow 为后续补建，用于运行 pretext-TUI 的 TUI-only 发布验证门禁；当前进度：覆盖 typecheck/test/static/oracle/corpus/fuzz/benchmark/terminal demo/API snapshot/package smoke。
name: TUI validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Test TUI
        run: bun run test:tui

      - name: Oracle check
        run: bun run tui-oracle-check

      - name: Corpus check
        run: bun run tui-corpus-check

      - name: Fuzz check
        run: bun run tui-fuzz --seed=ci --cases=2000

      - name: Benchmark check
        run: bun run benchmark-check:tui

      - name: Terminal demo
        run: bun run terminal-demo-check

      - name: API snapshot check
        run: bun run api-snapshot-check

      - name: Package smoke
        run: bun run package-smoke-test
